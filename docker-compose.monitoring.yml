# ================================================================
# Grand Battle Arena — Monitoring Stack
# ================================================================
# Run: docker-compose -f docker-compose.monitoring.yml up -d
#
# This sets up Prometheus + Grafana to scrape metrics from
# the Spring Boot backend's /actuator/prometheus endpoint.
#
# Access:
#   Prometheus:  http://localhost:9090
#   Grafana:     http://localhost:3001 (admin/admin)
# ================================================================

version: "3.8"

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: gba-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.1
    container_name: gba-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-grafana_admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change_this_before_prod}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
