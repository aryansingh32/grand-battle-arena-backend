version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-esport_tournament}
      POSTGRES_USER: ${DB_USER:-esport}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-esport123}
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-esport} -d ${DB_NAME:-esport_tournament}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gba-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gba-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 10000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-esport_tournament}
      DB_USER: ${DB_USER:-esport}
      DB_PASSWORD: ${DB_PASSWORD:-esport123}
      CACHE_TYPE: redis
      SPRING_DATA_REDIS_URL: redis://redis:6379
      UPSTASH_REDIS_SSL: "false"
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-change-me}
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:-}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS:-}
      FIREBASE_SERVICE_ACCOUNT_FILE: ${FIREBASE_SERVICE_ACCOUNT_FILE:-}
      ALLOWED_ORIGIN_PATTERNS: ${ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,http://localhost:5173,http://localhost:8081,http://127.0.0.1:8081,http://10.0.2.2:8081}
    ports:
      - "${APP_PORT_HOST:-10000}:10000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:10000/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
