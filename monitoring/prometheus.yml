# Prometheus scrape configuration for Grand Battle Arena backend
global:
  scrape_interval: 15s     # Scrape every 15 seconds
  evaluation_interval: 15s

scrape_configs:
  # ── Spring Boot Backend ──
  - job_name: "grand-battle-arena-backend"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:10000"]
        labels:
          app: "gba-backend"
          env: "production"
