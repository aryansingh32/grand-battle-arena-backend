services:
  # PostgreSQL Database
  - type: pserv
    name: esport-postgres
    env: docker
    plan: free
    region: singapore  # Choose closest region
    ipAllowList: []  # Empty for free tier

  # Redis Cache
  - type: redis
    name: esport-redis
    plan: free
    region: singapore
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # Spring Boot Application
  - type: web
    name: esport-backend
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      # Database (auto-generated by Render)
      - key: DATABASE_URL
        fromDatabase:
          name: esport-postgres
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: esport-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: esport-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: esport-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: esport-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: esport-postgres
          property: password
      
      # Redis (auto-generated by Render)
      - key: REDIS_URL
        fromService:
          type: redis
          name: esport-redis
          property: connectionString

      - key: CACHE_TYPE
        value: redis
      
      # Application Config
      - key: PORT
        value: 10000
      
      - key: APP_ADMIN_PASSWORD
        generateValue: true  # Render generates secure password
      
      # Firebase (set this manually in Render dashboard)
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false
