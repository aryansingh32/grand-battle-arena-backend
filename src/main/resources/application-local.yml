# Local Development Profile
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/esport_tournament
    username: esport
    password: esport123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      # Prevent empty URL parsing issue when running with local profile.
      # This value is only used if SPRING_DATA_REDIS_URL/REDIS_URL is not exported.
      url: redis://localhost:6379
      host: localhost
      port: 6379
      password:
      ssl:
        enabled: false
      timeout: 5000
      lettuce:
        pool:
          max-active: 5
          max-idle: 3
          min-idle: 1

  cache:
    # Local dev: avoid Redis dependency for config/cacheable endpoints
    type: simple

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  firebase:
    # Local setup:
    # export FIREBASE_CREDENTIALS='{"type":"service_account",...}'
    # OR export FIREBASE_SERVICE_ACCOUNT_BASE64='<base64_json>'
    credentials: ${FIREBASE_CREDENTIALS:}
    service-account-file: ${FIREBASE_SERVICE_ACCOUNT_FILE:}
    service-account-base64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:}
  admin:
    password: ${APP_ADMIN_PASSWORD:change-me-local}

logging:
  level:
    root: INFO
    com.esport: DEBUG

management:
  health:
    redis:
      enabled: false
