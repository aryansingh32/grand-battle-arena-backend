# Local Development Profile
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/esport_tournament
    username: esport
    password: esport123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      password:
      ssl:
        enabled: false
      timeout: 5000
      lettuce:
        pool:
          max-active: 5
          max-idle: 3
          min-idle: 1

  cache:
    type: redis

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

